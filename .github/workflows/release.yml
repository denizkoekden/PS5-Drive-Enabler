name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libgl1-mesa-dev libwayland-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p ps5de-cli -p ps5de-gui

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          bin=target/${{ matrix.target }}/release
          cp "$bin/ps5-drive-enabler${{ matrix.ext }}"     "dist/ps5-drive-enabler-${{ matrix.suffix }}${{ matrix.ext }}"
          cp "$bin/ps5-drive-enabler-gui${{ matrix.ext }}" "dist/ps5-drive-enabler-gui-${{ matrix.suffix }}${{ matrix.ext }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
